<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 10; }
      .txt { font: 600 14px Arial, sans-serif; fill: #111827; }
      .sub { font: 500 12px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 2.5; marker-end: url(#m); }
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>

  <text x="30" y="42" class="title">EMS API Request-Response Flow</text>

  <rect x="40" y="120" width="160" height="85" class="box" />
  <text x="92" y="155" class="txt">Frontend</text>
  <text x="65" y="177" class="sub">React (Axios)</text>

  <rect x="250" y="120" width="180" height="85" class="box" />
  <text x="284" y="155" class="txt">HTTP Request</text>
  <text x="266" y="177" class="sub">JSON + JWT Header</text>

  <rect x="480" y="120" width="190" height="85" class="box" />
  <text x="518" y="155" class="txt">FastAPI Router</text>
  <text x="503" y="177" class="sub">Endpoint Validation</text>

  <rect x="720" y="120" width="180" height="85" class="box" />
  <text x="747" y="155" class="txt">Auth + RBAC</text>
  <text x="733" y="177" class="sub">Token Verification</text>

  <rect x="950" y="120" width="190" height="85" class="box" />
  <text x="994" y="155" class="txt">Service Layer</text>
  <text x="975" y="177" class="sub">Business Logic</text>

  <rect x="760" y="300" width="180" height="85" class="box" />
  <text x="820" y="335" class="txt">Database</text>
  <text x="789" y="357" class="sub">SQL Query Execution</text>

  <rect x="480" y="300" width="200" height="85" class="box" />
  <text x="513" y="335" class="txt">JSON Response</text>
  <text x="498" y="357" class="sub">Status + Payload</text>

  <rect x="210" y="300" width="190" height="85" class="box" />
  <text x="267" y="335" class="txt">Frontend UI</text>
  <text x="247" y="357" class="sub">Dashboard Update</text>

  <line x1="200" y1="162" x2="250" y2="162" class="arrow" />
  <line x1="430" y1="162" x2="480" y2="162" class="arrow" />
  <line x1="670" y1="162" x2="720" y2="162" class="arrow" />
  <line x1="900" y1="162" x2="950" y2="162" class="arrow" />

  <line x1="1045" y1="205" x2="900" y2="300" class="arrow" />
  <line x1="760" y1="342" x2="680" y2="342" class="arrow" />
  <line x1="480" y1="342" x2="400" y2="342" class="arrow" />
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .box1 { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 12; }
      .box2 { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 12; }
      .box3 { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 12; }
      .box4 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .txt { font: 700 17px Arial, sans-serif; fill: #111827; }
      .sub { font: 500 14px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 3; marker-end: url(#m); }
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>

  <text x="30" y="42" class="title">EMS System Architecture</text>

  <rect x="80" y="100" width="240" height="120" class="box1" />
  <text x="145" y="145" class="txt">Frontend</text>
  <text x="116" y="170" class="sub">React + Vite + Axios</text>
  <text x="121" y="192" class="sub">Admin / Employee UI</text>

  <rect x="390" y="100" width="320" height="120" class="box2" />
  <text x="486" y="145" class="txt">API Layer</text>
  <text x="430" y="170" class="sub">REST APIs (HTTP + JSON)</text>
  <text x="449" y="192" class="sub">JWT in Authorization Header</text>

  <rect x="780" y="100" width="320" height="120" class="box3" />
  <text x="882" y="145" class="txt">Backend</text>
  <text x="834" y="170" class="sub">FastAPI + Services + RBAC</text>
  <text x="829" y="192" class="sub">Auth, Attendance, Payroll, Work</text>

  <rect x="390" y="300" width="320" height="140" class="box4" />
  <text x="493" y="348" class="txt">Database</text>
  <text x="436" y="373" class="sub">MySQL / PostgreSQL</text>
  <text x="440" y="395" class="sub">employees, attendance, work_details, payroll</text>

  <line x1="320" y1="160" x2="390" y2="160" class="arrow" />
  <line x1="710" y1="160" x2="780" y2="160" class="arrow" />
  <line x1="940" y1="220" x2="700" y2="370" class="arrow" />
  <line x1="550" y1="300" x2="550" y2="220" class="arrow" />
</svg>
